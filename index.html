<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather GPS Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    transition:.5s;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.card{
    width:100%;
    max-width:420px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.2);
    border-radius:25px;
    padding:25px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.title{
    text-align:center;
    margin-bottom:15px;
}

.weather-icon{
    text-align:center;
    font-size:70px;
}

.temp{
    text-align:center;
    font-size:55px;
    font-weight:bold;
}

.desc{
    text-align:center;
    font-size:20px;
    margin-bottom:10px;
}

.location{
    text-align:center;
    opacity:.9;
}

.info{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:20px;
}

.box{
    background:rgba(255,255,255,.12);
    padding:12px;
    border-radius:15px;
    text-align:center;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:15px;
    font-size:16px;
    cursor:pointer;
    background:white;
    color:#333;
    font-weight:bold;
}

.forecast{
    margin-top:20px;
}

.forecast h3{
    margin-bottom:10px;
}

.hour{
    display:flex;
    justify-content:space-between;
    padding:10px;
    margin-top:8px;
    border-radius:12px;
    background:rgba(255,255,255,.12);
}

.loading{
    text-align:center;
}
</style>
</head>
<body>

<div class="card">

<h2 class="title">🌦 Weather GPS Pro</h2>

<div id="content" class="loading">
Klik tombol untuk mengambil lokasi...
</div>

<button onclick="getWeather()">
📍 Ambil Lokasi & Prediksi Cuaca
</button>

</div>

<script>

const API_KEY = "ee1ee924494ce14c52e6fb2291553312";

function setBackground(weather){

if(weather.includes("Cloud")){
document.body.style.background=
"linear-gradient(135deg,#667db6,#0082c8,#0082c8,#667db6)";
}

else if(weather.includes("Rain")){
document.body.style.background=
"linear-gradient(135deg,#373B44,#4286f4)";
}

else if(weather.includes("Thunderstorm")){
document.body.style.background=
"linear-gradient(135deg,#141E30,#243B55)";
}

else if(weather.includes("Clear")){
document.body.style.background=
"linear-gradient(135deg,#f6d365,#fda085)";
}

else{
document.body.style.background=
"linear-gradient(135deg,#4facfe,#00f2fe)";
}

}

function getIcon(weather){

if(weather.includes("Clear")) return "☀️";
if(weather.includes("Cloud")) return "☁️";
if(weather.includes("Rain")) return "🌧️";
if(weather.includes("Thunderstorm")) return "⛈️";
if(weather.includes("Snow")) return "❄️";

return "🌤️";
}

function getWeather(){

document.getElementById("content").innerHTML =
"📡 Mengambil lokasi...";

navigator.geolocation.getCurrentPosition(

async(pos)=>{

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

try{

const current=await fetch(
`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=id`
);

const currentData=await current.json();

const forecast=await fetch(
`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=id`
);

const forecastData=await forecast.json();

const weatherMain=currentData.weather[0].main;

setBackground(weatherMain);

let html=`

<div class="weather-icon">
${getIcon(weatherMain)}
</div>

<div class="temp">
${Math.round(currentData.main.temp)}°C
</div>

<div class="desc">
${currentData.weather[0].description}
</div>

<div class="location">
📍 ${currentData.name}
</div>

<div class="info">

<div class="box">
💧<br>
${currentData.main.humidity}%<br>
Kelembapan
</div>

<div class="box">
💨<br>
${currentData.wind.speed} m/s<br>
Angin
</div>

<div class="box">
🌡️<br>
${Math.round(currentData.main.feels_like)}°C<br>
Terasa
</div>

<div class="box">
📈<br>
${currentData.main.pressure} hPa<br>
Tekanan
</div>

</div>

<div class="forecast">
<h3>⏰ Prediksi Jam Berikutnya</h3>
`;

for(let i=0;i<6;i++){

let item=forecastData.list[i];

html+=`
<div class="hour">
<span>${item.dt_txt.slice(11,16)}</span>
<span>${Math.round(item.main.temp)}°C</span>
<span>${item.weather[0].description}</span>
</div>
`;
}

html+=`</div>`;

document.getElementById("content").innerHTML=html;

}catch(err){

document.getElementById("content").innerHTML=
"❌ Gagal mengambil data cuaca.";

}

},

()=>{
document.getElementById("content").innerHTML=
"❌ Izin lokasi ditolak.";
}

);

}

</script>

</body>
</html>

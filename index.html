<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather GPS Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
}

.card{
width:100%;
max-width:450px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:25px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

.weather{
text-align:center;
}

.temp{
font-size:60px;
font-weight:bold;
}

.icon{
font-size:70px;
}

.info{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

.box{
background:rgba(255,255,255,.12);
padding:10px;
border-radius:12px;
text-align:center;
}

.hour{
margin-top:10px;
padding:10px;
border-radius:12px;
background:rgba(255,255,255,.12);
}

#error{
margin-top:15px;
color:#ffdddd;
font-size:14px;
word-break:break-word;
}
</style>
</head>
<body>

<div class="card">

<h1>🌦 Weather GPS Pro</h1>

<div id="content">
Klik tombol untuk mengambil lokasi
</div>

<button onclick="getWeather()">
📍 Ambil Lokasi
</button>

<div id="error"></div>

</div>

<script>

const API_KEY = "ee1ee924494ce14c52e6fb2291553312";

function icon(main){

switch(main){

case "Clear":
return "☀️";

case "Clouds":
return "☁️";

case "Rain":
return "🌧️";

case "Thunderstorm":
return "⛈️";

case "Snow":
return "❄️";

default:
return "🌤️";

}

}

async function getWeather(){

const content=document.getElementById("content");
const error=document.getElementById("error");

error.innerHTML="";
content.innerHTML="📡 Mengambil lokasi...";

if(!navigator.geolocation){

content.innerHTML="❌ GPS tidak didukung";
return;

}

navigator.geolocation.getCurrentPosition(

async(position)=>{

try{

const lat=position.coords.latitude;
const lon=position.coords.longitude;

const weatherResponse=await fetch(
`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=id`
);

const weather=await weatherResponse.json();

if(weather.cod!=200){

throw new Error(
"Weather API: " + JSON.stringify(weather)
);

}

const forecastResponse=await fetch(
`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=id`
);

const forecast=await forecastResponse.json();

if(forecast.cod!="200"){

throw new Error(
"Forecast API: " + JSON.stringify(forecast)
);

}

let html=`

<div class="weather">

<div class="icon">
${icon(weather.weather[0].main)}
</div>

<div class="temp">
${Math.round(weather.main.temp)}°C
</div>

<h2>${weather.name}</h2>

<p>${weather.weather[0].description}</p>

</div>

<div class="info">

<div class="box">
💧<br>
${weather.main.humidity}%<br>
Kelembapan
</div>

<div class="box">
💨<br>
${weather.wind.speed} m/s<br>
Angin
</div>

<div class="box">
🌡️<br>
${Math.round(weather.main.feels_like)}°C<br>
Terasa
</div>

<div class="box">
📈<br>
${weather.main.pressure} hPa<br>
Tekanan
</div>

</div>

<h3 style="margin-top:20px">
Prediksi Cuaca
</h3>

`;

forecast.list.slice(0,6).forEach(item=>{

html+=`

<div class="hour">

<b>${item.dt_txt}</b>

<br>

🌡️ ${Math.round(item.main.temp)}°C

<br>

☁️ ${item.weather[0].description}

</div>

`;

});

content.innerHTML=html;

}catch(err){

console.error(err);

error.innerHTML=
"ERROR : " + err.message;

content.innerHTML=
"❌ Gagal mengambil data cuaca";

}

},

(err)=>{

content.innerHTML=
"❌ GPS gagal";

error.innerHTML=
err.message;

},

{
enableHighAccuracy:true,
timeout:15000,
maximumAge:0
}

);

}

</script>

</body>
</html>
